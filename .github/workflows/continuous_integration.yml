name: Continuous integration


on:
  push:
    branches:
      - main
      - dev


jobs:
  build:
    strategy:
      matrix:
        config: 
          - { os: windows-latest, image: "", artifact-name: Windows, additional-command: "" }
          - { os: ubuntu-latest, image: ghcr.io/lazypanda07/ubuntu_cxx20:24.04, artifact-name: Linux, additional-command: "sudo apt update && sudo apt install -y alsa-base libasound2-dev" }
    runs-on: ${{ matrix.config.os }}
    container:
      image: ${{ matrix.config.image }}

    steps:
    - uses: actions/checkout@v6
      
    - name: Enable NMake
      if: ${{ matrix.config.os == 'windows-latest' }}
      uses: ilammy/msvc-dev-cmd@v1.13.0

    - name: Additional action
      if: ${{ matrix.config.additional-command != '' }}
      run: ${{ matrix.config.additional-command }}

    - name: Build
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_INSTALL_PREFIX=install-dir -DCMAKE_BUILD_TYPE=Release -G "Ninja" ..
        cmake --build . -j
        cmake --install .

    - name: Upload ${{ matrix.config.artifact-name }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.config.artifact-name }}
        path: |
          build/install-dir/client/bin/*
          build/install-dir/server/bin/*
